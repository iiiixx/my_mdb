syntax = "proto3";

package recs;

option go_package = "protos/gen/recs;recs";

service Recommender {
  rpc Recommend(RecommendRequest) returns (RecommendResponse);
  rpc SimilarMovies(SimilarMoviesRequest) returns (SimilarMoviesResponse);
}

message RecommendRequest {
  int32 user_id = 1;
  int32 limit = 2;
  repeated int32 exclude_movie_ids = 3;
}

message RecommendItem {
  int32 movie_id = 1;
  float score = 2; 
}

message RecommendResponse {
  repeated RecommendItem items = 1;
}


message SimilarMoviesRequest {
  int32 movie_id = 1;
  int32 limit = 2;
  repeated int32 exclude_movie_ids = 3;
}

message SimilarMovieItem {
  int32 movie_id = 1;
  float similarity = 2;
}

message SimilarMoviesResponse {
  repeated SimilarMovieItem items = 1;
}